<section class="categories-form">
  <app-navbar mode="private" [userRole]="userRole" (toggleSidebar)="toggleSidebar()"></app-navbar>

  <mat-drawer-container class="categories-form__drawer-container" autosize>
    <mat-drawer class="categories-form__drawer" mode="over" position="start" [opened]="drawerOpen"
      (closedStart)="drawerOpen = false">
      <app-left-sidebar [userRole]="userRole" (closeSidebar)="closeSidebar()"></app-left-sidebar>
    </mat-drawer>

    <mat-drawer-content class="categories-form__content">
      <div class="categories-form__main">
        <main class="categories-form__body">
          <section class="categories-form__hero">
            <div class="categories-form__hero-copy">
              <h1 class="categories-form__title">Nueva categoría</h1>
              <p class="categories-form__subtitle">Crea una categoría académica</p>
            </div>

            <button mat-stroked-button type="button" (click)="goBack()">
              <mat-icon>arrow_back</mat-icon>
              Volver a categorías
            </button>
          </section>

          <section class="categories-form__form-section">
            <mat-card class="categories-form__card">
              <mat-card-content>
                <h2 class="categories-form__form-title">Formulario de categoría</h2>

                <mat-form-field class="categories-form__field" appearance="outline">
                  <mat-label>Nombre de la categoría</mat-label>
                  <input [(ngModel)]="nombre" type="text" matInput placeholder="Escribe el nombre de la categoría"
                    (keydown)="onlyAlphanumeric($event)">
                </mat-form-field>
                @if (errors.nombre) {
                <div class="categories-form__error">{{ errors.nombre }}</div>
                }

                <mat-form-field class="categories-form__field" appearance="outline">
                  <mat-label>Estado</mat-label>
                  <mat-select [(ngModel)]="estado">

                    <mat-option value="ACTIVA">Activa</mat-option>
                    <mat-option value="INACTIVA">Inactiva</mat-option>
                  </mat-select>
                </mat-form-field>
                @if (errors.estado) {
                <div class="categories-form__error">{{ errors.estado }}</div>
                }

                <div class="categories-form__actions">
                  <button mat-stroked-button type="button" (click)="goBack()">
                    Cancelar
                  </button>

                  <button mat-flat-button type="button" (click)="submit()">
                    Guardar categoría
                  </button>
                </div>
              </mat-card-content>
            </mat-card>
          </section>
        </main>

        <app-footer></app-footer>
      </div>
    </mat-drawer-content>
  </mat-drawer-container>
</section>

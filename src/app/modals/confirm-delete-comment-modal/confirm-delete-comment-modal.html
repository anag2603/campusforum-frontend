<h2 mat-dialog-title class="modal-title">
  <mat-icon>delete</mat-icon>
  Eliminar comentario
</h2>

<mat-dialog-content class="modal-content">
  <p>¿Seguro que deseas eliminar este comentario?</p>

  <div class="modal-box">
    <strong>{{ data.autor }}</strong>
    <p>{{ data.contenido }}</p>
  </div>

  <p class="modal-warning">Esta acción no se puede deshacer.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cancel()">Cancelar</button>
  <button mat-flat-button type="button" color="warn" (click)="confirm()">Eliminar</button>
</mat-dialog-actions>
